services:
  postgres:
    image: postgres:16-alpine
    container_name: habits_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-habits}
      POSTGRES_USER: ${DB_USER:-habits_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_to_strong_password}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-habits_user} -d ${DB_NAME:-habits}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
